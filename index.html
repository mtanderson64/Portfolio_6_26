<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mark Anderson</title>
    <link rel="stylesheet" href="styles.css">
     <script src="app.js"></script>
    <script src="https://kit.fontawesome.com/26bd003b94.js" crossorigin="anonymous" defer></script>
    
</head>
<body>
    <section id="landing-page">
        <nav>
            <figure>
                <img id="personal-logo" src="./assets/logo.svg" alt="">
            </figure>
            <ul class="nav__link--list">
                <li class="nav__link click">
                    <a href="#" class="nav__link--anchor link__hover-effect link__hover-effect--black">
                        About
                    </a>
                </li>
                <li class="nav__link click">
                    <a href="#" class="nav__link--anchor link__hover-effect link__hover-effect--black">
                        Projects
                    </a>
                </li>
                <li class="nav__link click">
                    <a href="#" class="nav__link--anchor link__hover-effect link__hover-effect--black">
                        Contact
                    </a>
                </li>
                <li class="nav__link click">
                    <a href="#" class="nav__link--anchor link__hover-effect link__hover-effect--black">
                        <i class="fa-solid fa-circle-half-stroke"></i>
                    </a>
                </li>
                
            </ul>
        </nav>
        <header class="header">
            <div class="header__content">
                <h1 class="title">Hello<br>
                <span class="text--emphasis">I'm Mark.</span></h1>
                <p class="header__para">
                    I'm a <span class="text--emphasis">Frontend Web Developer</span> with a passion for building web applications with great user experiences.
                </p>
                <p class="header__para">
                    Here's a bit more <a href="#" class="text--emphasis">about me.</a>
                </p>
                <div class="header__links">
                    <a href="" target="_blank" class="header__link click">
                        <i class="fa-brands fa-linkedin-in"></i>
                    </a>
                    <a href="" target="_blank" class="header__link click">
                        <i class="fa-brands fa-github-alt"></i>
                    </a>
                    <a href="./assets/David Bragg Resume.pdf" target="_blank" class="header__link click">
                        <i class="fa-solid fa-file-lines"></i>
                    </a>
                </div>
            </div>
        </header>
        <div class="mail__btn click">
            <i class="fa-solid fa-paper-plane"></i>
        </div>
        <a href="#projects" class="scroll">
            <div class="scroll__icon click"></div>
        </a>
    </section>
    

</body>
</html>
